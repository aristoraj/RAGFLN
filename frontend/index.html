<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLN Learning Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #22263a;
      --border:     #2e3350;
      --accent:     #6c63ff;
      --accent-dim: #4c46c0;
      --text:       #e2e5f1;
      --text-dim:   #7f87ab;
      --user-bg:    #6c63ff;
      --bot-bg:     #1e2235;
      --badge-bg:   #2a2f4a;
      --badge-text: #a0a8cf;
      --error:      #ff6b6b;
      --radius:     14px;
      --gap:        12px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

    /* ── Header ── */
    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    header h1  { font-size: 1.05rem; font-weight: 600; }
    header p   { font-size: 0.75rem; color: var(--text-dim); }

    .new-chat-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .new-chat-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

    /* ── Chat container ── */
    main {
      width: 100%; max-width: 780px;
      flex: 1; display: flex; flex-direction: column;
      padding: 0 16px;
    }

    #chat-window {
      flex: 1; overflow-y: auto;
      padding: 24px 0 8px;
      display: flex; flex-direction: column;
      gap: var(--gap);
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 6px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Messages ── */
    .msg-row {
      display: flex; gap: 10px; align-items: flex-end;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }
    .msg-row.bot  { flex-direction: row; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }

    .msg-row.user .avatar { background: var(--accent-dim); }
    .msg-row.bot  .avatar { background: var(--surface2); }

    .bubble-wrap { max-width: 74%; display: flex; flex-direction: column; gap: 6px; }
    .msg-row.user .bubble-wrap { align-items: flex-end; }
    .msg-row.bot  .bubble-wrap { align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 0.92rem;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }

    .msg-row.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble.error { border-color: var(--error); color: var(--error); }

    /* Markdown styles inside bot bubbles */
    .msg-row.bot .bubble p   { margin: 4px 0; }
    .msg-row.bot .bubble p:first-child { margin-top: 0; }
    .msg-row.bot .bubble p:last-child  { margin-bottom: 0; }
    .msg-row.bot .bubble ul,
    .msg-row.bot .bubble ol  { padding-left: 20px; margin: 6px 0; }
    .msg-row.bot .bubble li  { margin: 3px 0; }
    .msg-row.bot .bubble h1,
    .msg-row.bot .bubble h2,
    .msg-row.bot .bubble h3  { font-size: 1em; font-weight: 700; margin: 10px 0 4px; color: var(--text); }
    .msg-row.bot .bubble strong { font-weight: 600; color: #c8ccf0; }
    .msg-row.bot .bubble em  { font-style: italic; color: var(--text-dim); }
    .msg-row.bot .bubble code {
      background: rgba(255,255,255,0.08);
      padding: 1px 5px; border-radius: 4px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.86em;
    }
    .msg-row.bot .bubble pre {
      background: rgba(0,0,0,0.35);
      padding: 10px 12px; border-radius: 8px;
      overflow-x: auto; margin: 8px 0;
    }
    .msg-row.bot .bubble pre code { background: none; padding: 0; }
    .msg-row.bot .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 10px; margin: 6px 0;
      color: var(--text-dim);
    }
    .msg-row.bot .bubble hr {
      border: none; border-top: 1px solid var(--border); margin: 10px 0;
    }

    /* Streaming cursor */
    .bubble.streaming::after {
      content: '▋';
      display: inline-block;
      animation: blink 0.7s step-end infinite;
      color: var(--accent);
      margin-left: 1px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Source badges ── */
    .sources { display: flex; flex-wrap: wrap; gap: 6px; }

    .source-badge {
      background: var(--badge-bg);
      color: var(--badge-text);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.72rem;
      display: flex; align-items: center; gap: 4px;
    }

    .source-badge::before { content: "📄"; font-size: 0.7rem; }

    /* ── Typing indicator ── */
    .typing-bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex; gap: 5px; align-items: center;
    }

    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-dim);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-7px); }
    }

    /* ── Welcome card ── */
    #welcome {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      padding: 48px 24px; text-align: center;
    }

    #welcome .icon { font-size: 48px; }
    #welcome h2    { font-size: 1.4rem; font-weight: 700; }
    #welcome p     { color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; max-width: 420px; }

    .suggestions {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 8px; margin-top: 8px;
    }

    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .suggestion-btn:hover { background: var(--accent); border-color: var(--accent); }

    /* ── Input area ── */
    footer { width: 100%; max-width: 780px; padding: 12px 16px 20px; }

    .input-box {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.15s;
    }

    .input-box:focus-within { border-color: var(--accent); }

    #question-input {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: var(--text);
      font-size: 0.92rem; line-height: 1.5;
      resize: none; max-height: 160px;
      overflow-y: auto; font-family: inherit;
    }

    #question-input::placeholder { color: var(--text-dim); }

    #send-btn {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--accent); border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-dim); transform: scale(1.04); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .input-hint { text-align: center; color: var(--text-dim); font-size: 0.72rem; margin-top: 6px; }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .bubble-wrap { max-width: 88%; }
      #welcome { padding: 28px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">📚</div>
  <div>
    <h1>FLN Learning Assistant</h1>
    <p>9 chapters loaded · Ask anything</p>
  </div>
  <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
</header>

<main>
  <div id="chat-window">
    <div id="welcome">
      <div class="icon">🤖</div>
      <h2>Hello! I'm your FLN learning assistant.</h2>
      <p>
        I've read all 9 chapters of the Lead FLN materials. Ask me anything —
        summaries, deep dives, comparisons, or follow-up questions.
      </p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Give an overview of all 9 chapters</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">What is FLN and why does it matter?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Walk me through Chapter 1</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">What are the key teaching strategies?</button>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="input-box">
    <textarea
      id="question-input"
      rows="1"
      placeholder="Ask a question about the FLN materials…"
      aria-label="Your question"
    ></textarea>
    <button id="send-btn" aria-label="Send" onclick="handleSend()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>
  <p class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
</footer>

<script>
  // Configure marked
  marked.setOptions({ breaks: true, gfm: true });

  const chatWindow = document.getElementById('chat-window');
  const input      = document.getElementById('question-input');
  const sendBtn    = document.getElementById('send-btn');
  let   isWaiting  = false;

  // Conversation history sent to backend so it can rewrite follow-up questions
  let conversationHistory = [];

  // ── Input auto-grow ──
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  function sendSuggestion(btn) { input.value = btn.textContent; handleSend(); }
  function handleSend() { const q = input.value.trim(); if (!q || isWaiting) return; sendMessage(q); }

  // ── New Chat ──
  function newChat() {
    if (isWaiting) return;
    conversationHistory = [];
    chatWindow.innerHTML = '';
    const welcome = document.getElementById('welcome');
    // Recreate welcome card
    const div = document.createElement('div');
    div.id = 'welcome';
    div.innerHTML = `
      <div class="icon">🤖</div>
      <h2>Hello! I'm your FLN learning assistant.</h2>
      <p>I've read all 9 chapters of the Lead FLN materials. Ask me anything —
        summaries, deep dives, comparisons, or follow-up questions.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Give an overview of all 9 chapters</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">What is FLN and why does it matter?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Walk me through Chapter 1</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">What are the key teaching strategies?</button>
      </div>`;
    chatWindow.appendChild(div);
  }

  // ── Main send flow (streaming) ──
  async function sendMessage(question) {
    isWaiting  = true;
    sendBtn.disabled = true;

    const welcomeEl = document.getElementById('welcome');
    if (welcomeEl) welcomeEl.remove();

    input.value = '';
    input.style.height = 'auto';

    appendUserMessage(question);
    const typingEl = appendTyping();
    scrollToBottom();

    // Snapshot history BEFORE this turn so backend condenses the question correctly
    const historySnapshot = [...conversationHistory];

    let streamBuffer = '';
    let botBubble    = null;
    let finalSources = [];

    try {
      const resp = await fetch('/api/chat/stream', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ question, messages: historySnapshot }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        typingEl.remove();
        appendBotMessage(err.detail || 'Server error.', [], true);
        isWaiting = false; sendBtn.disabled = false; input.focus();
        return;
      }

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let   sseBuffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        sseBuffer += decoder.decode(value, { stream: true });

        // SSE events are separated by \n\n
        const parts = sseBuffer.split('\n\n');
        sseBuffer = parts.pop() ?? '';

        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data: ')) continue;
          let data;
          try { data = JSON.parse(line.slice(6)); } catch { continue; }

          if (data.error) {
            typingEl.remove();
            appendBotMessage(data.error, [], true);
            isWaiting = false; sendBtn.disabled = false; input.focus();
            return;
          }

          if (data.token) {
            // First token: swap typing indicator for a real bubble
            if (!botBubble) {
              typingEl.remove();
              const row = document.createElement('div');
              row.className = 'msg-row bot';
              row.innerHTML = `<div class="avatar">🤖</div><div class="bubble-wrap"></div>`;
              const wrap = row.querySelector('.bubble-wrap');
              botBubble = document.createElement('div');
              botBubble.className = 'bubble streaming';
              wrap.appendChild(botBubble);
              chatWindow.appendChild(row);
            }
            streamBuffer += data.token;
            // Show plain text while streaming (with cursor via CSS)
            botBubble.textContent = streamBuffer;
            scrollIfNeeded();
          }

          if (data.done) {
            finalSources = data.sources || [];
          }
        }
      }

      // Stream complete — render markdown and add sources
      if (botBubble) {
        botBubble.classList.remove('streaming');
        botBubble.innerHTML = marked.parse(streamBuffer);
        if (finalSources.length) {
          const sourcesDiv = document.createElement('div');
          sourcesDiv.className = 'sources';
          sourcesDiv.innerHTML = finalSources
            .map(s => `<span class="source-badge">${escapeHtml(s)}</span>`)
            .join('');
          botBubble.parentElement.appendChild(sourcesDiv);
        }
      } else {
        // No tokens received at all
        typingEl.remove();
        appendBotMessage("I couldn't find this in the learning materials.", []);
      }

    } catch (err) {
      typingEl.remove();
      appendBotMessage('Could not reach the server. Check your connection.', [], true);
      isWaiting = false; sendBtn.disabled = false; input.focus();
      return;
    }

    // Update conversation history for next turn
    conversationHistory.push({ role: 'user',      content: question });
    conversationHistory.push({ role: 'assistant', content: streamBuffer });

    // Keep history to last 10 exchanges (20 messages) to avoid token limits
    if (conversationHistory.length > 20) {
      conversationHistory = conversationHistory.slice(-20);
    }

    scrollToBottom();
    isWaiting = false;
    sendBtn.disabled = false;
    input.focus();
  }

  // ── DOM helpers ──
  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="avatar">🙂</div>
      <div class="bubble-wrap">
        <div class="bubble">${escapeHtml(text)}</div>
      </div>`;
    chatWindow.appendChild(row);
  }

  function appendBotMessage(text, sources, isError = false) {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    const sourcesHtml = sources.length
      ? `<div class="sources">${sources.map(s => `<span class="source-badge">${escapeHtml(s)}</span>`).join('')}</div>`
      : '';
    row.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble-wrap">
        <div class="bubble${isError ? ' error' : ''}">${isError ? escapeHtml(text) : marked.parse(text)}</div>
        ${sourcesHtml}
      </div>`;
    chatWindow.appendChild(row);
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="typing-bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>`;
    chatWindow.appendChild(row);
    return row;
  }

  function scrollToBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

  function scrollIfNeeded() {
    const { scrollTop, scrollHeight, clientHeight } = chatWindow;
    if (scrollHeight - scrollTop - clientHeight < 150) scrollToBottom();
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
</body>
</html>
