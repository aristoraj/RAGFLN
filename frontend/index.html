<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning PDF Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #22263a;
      --border:     #2e3350;
      --accent:     #6c63ff;
      --accent-dim: #4c46c0;
      --text:       #e2e5f1;
      --text-dim:   #7f87ab;
      --user-bg:    #6c63ff;
      --bot-bg:     #1e2235;
      --badge-bg:   #2a2f4a;
      --badge-text: #a0a8cf;
      --error:      #ff6b6b;
      --radius:     14px;
      --gap:        12px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    header p {
      font-size: 0.78rem;
      color: var(--text-dim);
    }

    /* ── Chat container ── */
    main {
      width: 100%;
      max-width: 780px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 8px;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 6px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Messages ── */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user  { flex-direction: row-reverse; }
    .msg-row.bot   { flex-direction: row; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .msg-row.user .avatar { background: var(--accent-dim); }
    .msg-row.bot  .avatar { background: var(--surface2); }

    .bubble-wrap { max-width: 74%; display: flex; flex-direction: column; gap: 6px; }
    .msg-row.user .bubble-wrap { align-items: flex-end; }
    .msg-row.bot  .bubble-wrap { align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-row.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble.error { border-color: var(--error); color: var(--error); }

    /* ── Source badges ── */
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .source-badge {
      background: var(--badge-bg);
      color: var(--badge-text);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.72rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .source-badge::before { content: "📄"; font-size: 0.7rem; }

    /* ── Typing indicator ── */
    .typing-row { display: flex; align-items: flex-end; gap: 10px; }

    .typing-bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-7px); }
    }

    /* ── Welcome card ── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 48px 24px;
      text-align: center;
    }

    #welcome .icon { font-size: 48px; }
    #welcome h2 { font-size: 1.4rem; font-weight: 700; }
    #welcome p  { color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; max-width: 380px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }

    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .suggestion-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* ── Input area ── */
    footer {
      width: 100%;
      max-width: 780px;
      padding: 12px 16px 20px;
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.15s;
    }

    .input-box:focus-within { border-color: var(--accent); }

    #question-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.92rem;
      line-height: 1.5;
      resize: none;
      max-height: 160px;
      overflow-y: auto;
      font-family: inherit;
    }

    #question-input::placeholder { color: var(--text-dim); }

    #send-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-dim); transform: scale(1.04); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .input-hint {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.72rem;
      margin-top: 6px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .bubble-wrap { max-width: 88%; }
      #welcome { padding: 28px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">📚</div>
  <div>
    <h1>Learning PDF Chatbot</h1>
    <p>Ask questions about your documents</p>
  </div>
</header>

<main>
  <div id="chat-window">
    <div id="welcome">
      <div class="icon">🤖</div>
      <h2>Hello! I'm your learning assistant.</h2>
      <p>
        I've read all your PDFs and I'm ready to answer your questions.
        Ask me anything about the learning materials.
      </p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">What topics are covered?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Summarize the key concepts</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Give me a quick overview</button>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="input-box">
    <textarea
      id="question-input"
      rows="1"
      placeholder="Ask a question about your PDFs…"
      aria-label="Your question"
    ></textarea>
    <button id="send-btn" aria-label="Send" onclick="handleSend()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>
  <p class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
</footer>

<script>
  const chatWindow   = document.getElementById('chat-window');
  const input        = document.getElementById('question-input');
  const sendBtn      = document.getElementById('send-btn');
  const welcome      = document.getElementById('welcome');
  let   isWaiting    = false;

  // Auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  // Enter = send, Shift+Enter = new line
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  function sendSuggestion(btn) {
    input.value = btn.textContent;
    handleSend();
  }

  function handleSend() {
    const question = input.value.trim();
    if (!question || isWaiting) return;
    sendMessage(question);
  }

  async function sendMessage(question) {
    isWaiting = true;
    sendBtn.disabled = true;

    // Hide welcome card on first message
    if (welcome) welcome.remove();

    input.value = '';
    input.style.height = 'auto';

    appendUserMessage(question);
    const typingEl = appendTyping();
    scrollToBottom();

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });

      typingEl.remove();

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        appendBotMessage(err.detail || 'An error occurred.', [], true);
      } else {
        const data = await resp.json();
        appendBotMessage(data.answer, data.sources || []);
      }
    } catch (err) {
      typingEl.remove();
      appendBotMessage(
        'Could not reach the server. Make sure the backend is running.',
        [],
        true
      );
    }

    scrollToBottom();
    isWaiting = false;
    sendBtn.disabled = false;
    input.focus();
  }

  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="avatar">🙂</div>
      <div class="bubble-wrap">
        <div class="bubble">${escapeHtml(text)}</div>
      </div>`;
    chatWindow.appendChild(row);
  }

  function appendBotMessage(text, sources, isError = false) {
    const row = document.createElement('div');
    row.className = 'msg-row bot';

    const sourcesHtml = sources.length
      ? `<div class="sources">${sources.map(s =>
          `<span class="source-badge">${escapeHtml(s)}</span>`
        ).join('')}</div>`
      : '';

    row.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble-wrap">
        <div class="bubble${isError ? ' error' : ''}">${escapeHtml(text)}</div>
        ${sourcesHtml}
      </div>`;
    chatWindow.appendChild(row);
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot typing-row';
    row.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="typing-bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>`;
    chatWindow.appendChild(row);
    return row;
  }

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
</body>
</html>
